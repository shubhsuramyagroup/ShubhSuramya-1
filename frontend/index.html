<!doctype html>
<html lang="en-IN" class="scroll-smooth overflow-x-clip">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta (default / no-JS & social-scraper fallback; React overrides per route) -->
    <title>Shubh Suramya | Luxury Real Estate Developer in Ahmedabad</title>
    <meta
      name="description"
      content="Shubh Suramya builds luxury residential & commercial projects in Ahmedabad, Gujarat — premium villas and modern apartments crafted with modern architecture."
    />
    <meta
      name="keywords"
      content="Shubh Suramya, Shubh Suramya Ahmedabad, Luxury Homes Ahmedabad, Residential Projects Gujarat, Commercial Property Ahmedabad, Premium Villas, Modern Apartments, Real Estate Ahmedabad, Property Developer Gujarat, Construction Company Ahmedabad"
    />
    <meta name="author" content="Shubh Suramya Group" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="rating" content="general" />
    <!-- NOTE: canonical is intentionally NOT set here. Each route renders its own
         single <link rel="canonical"> via the React <Seo> component. A static one
         here would create duplicate/conflicting canonicals (Google ignores those). -->


    <!-- Theme / browser chrome -->
    <meta name="theme-color" content="#1F2A44" />
    <meta name="color-scheme" content="light" />

    <!-- Apple mobile web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shubh Suramya" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Microsoft browser tags -->
    <meta name="application-name" content="Shubh Suramya" />
    <meta name="msapplication-TileColor" content="#1F2A44" />
    <meta name="msapplication-TileImage" content="/logo.png" />

    <!-- Icons + manifest -->
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Open Graph (default; React overrides per route) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Shubh Suramya" />
    <meta property="og:title" content="Shubh Suramya | Luxury Real Estate Developer in Ahmedabad" />
    <meta
      property="og:description"
      content="Luxury residential & commercial real estate in Ahmedabad, Gujarat — premium villas and modern apartments by Shubh Suramya."
    />
    <meta property="og:url" content="https://www.shubhsuramya.com/" />
    <meta property="og:image" content="https://www.shubhsuramya.com/hero_img.jpg" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card (default; React overrides per route) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shubh Suramya | Luxury Real Estate Developer in Ahmedabad" />
    <meta
      name="twitter:description"
      content="Luxury residential & commercial real estate in Ahmedabad, Gujarat — premium villas and modern apartments by Shubh Suramya."
    />
    <meta name="twitter:image" content="https://www.shubhsuramya.com/hero_img.jpg" />

    <!-- Performance: warm up font connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
